name: Enable HTTPS when certificate is ready

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  actions: write

jobs:
  enable-https:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if HTTPS is already enforced
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          enforced="$(gh api repos/${{ github.repository }}/pages --jq '.https_enforced')"
          if [ "$enforced" = "true" ]; then
            echo "HTTPS already enforced."
            echo "already_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Disable workflow (already complete)
        if: steps.check.outputs.already_enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow disable "${{ github.workflow }}" --repo "${{ github.repository }}"
          echo "Scheduled runs disabled."

      - name: Turn on Enforce HTTPS for easyvid.online
        if: steps.check.outputs.already_enabled != 'true'
        id: enable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          response="$(gh api --method PUT repos/${{ github.repository }}/pages \
            --input - <<'JSON'
          {"cname":"easyvid.online","https_enforced":true}
          JSON
          )"
          enforced="$(echo "$response" | jq -r '.https_enforced')"
          if [ "$enforced" = "true" ]; then
            echo "HTTPS enforced successfully."
          else
            echo "Pages updated but https_enforced is not true yet."
            exit 1
          fi

      - name: Disable workflow after success
        if: steps.check.outputs.already_enabled != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow disable "${{ github.workflow }}" --repo "${{ github.repository }}"
          echo "Certificate ready. Scheduled runs disabled."
